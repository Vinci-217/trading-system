syntax = "proto3";

package stock_trader;

option go_package = "stock_trader/api";

// 行情服务
service MarketService {
    rpc GetQuote(GetQuoteRequest) returns (Quote);
    rpc GetKLine(GetKLineRequest) returns (ListKLineResponse);
    rpc ListSymbols(ListSymbolsRequest) returns (ListSymbolsResponse);
    rpc SubscribeQuote(SubscribeQuoteRequest) returns (stream Quote);
}

message GetQuoteRequest {
    string symbol = 1;
}

message Quote {
    string symbol = 1;
    string symbol_name = 2;
    double price = 3;
    double prev_close = 4;
    double change = 5;
    double change_percent = 6;
    double high = 7;
    double low = 8;
    double open = 9;
    int64 volume = 10;
    double amount = 11;
    double bid_price = 12;
    double ask_price = 13;
    int64 bid_volume = 14;
    int64 ask_volume = 15;
    int64 timestamp = 16;
}

message GetKLineRequest {
    string symbol = 1;
    string period = 2; // 1m, 5m, 15m, 1h, 4h, 1d, 1w
    int32 limit = 3;
}

message KLine {
    string symbol = 1;
    string period = 2;
    int64 timestamp = 3;
    double open = 4;
    double high = 5;
    double low = 6;
    double close = 7;
    int64 volume = 8;
    double amount = 9;
}

message ListKLineResponse {
    repeated KLine klines = 1;
}

message ListSymbolsRequest {
    string exchange = 1;
    string status = 2;
}

message Symbol {
    string symbol = 1;
    string symbol_name = 2;
    string exchange = 3;
    string currency = 4;
    int32 lot_size = 5;
    double price_tick = 6;
    string status = 7;
}

message ListSymbolsResponse {
    repeated Symbol symbols = 1;
}

message SubscribeQuoteRequest {
    string symbol = 1;
}
