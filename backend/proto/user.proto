syntax = "proto3";

package stock_trader;

option go_package = "stock_trader/api";

// 用户服务
service UserService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetProfile(GetProfileRequest) returns (UserProfile);
}

message RegisterRequest {
    string username = 1;
    string password = 2;
    string email = 3;
    string phone = 4;
}

message RegisterResponse {
    int64 user_id = 1;
    string message = 2;
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
    int64 user_id = 2;
    string username = 3;
    int64 expires_at = 4;
}

message GetProfileRequest {
    int64 user_id = 1;
}

message UserProfile {
    int64 user_id = 1;
    string username = 2;
    string email = 3;
    string phone = 4;
    string status = 5;
    int64 created_at = 6;
}
