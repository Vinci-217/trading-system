syntax = "proto3";

package trading;

option go_package = "github.com/stock-trading-system/api/proto/trading";

service TradingService {
    rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
    rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
    rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
    rpc GetOrders(GetOrdersRequest) returns (GetOrdersResponse);
    rpc GetOrderByClientID(GetOrderByClientIDRequest) returns (GetOrderByClientIDResponse);
}

message CreateOrderRequest {
    string user_id = 1;
    string symbol = 2;
    int32 side = 3;
    int32 order_type = 4;
    string price = 5;
    int32 quantity = 6;
    string client_order_id = 7;
}

message CreateOrderResponse {
    int32 code = 1;
    string message = 2;
    Order order = 3;
}

message CancelOrderRequest {
    string user_id = 1;
    string order_id = 2;
}

message CancelOrderResponse {
    int32 code = 1;
    string message = 2;
    Order order = 3;
}

message GetOrderRequest {
    string user_id = 1;
    string order_id = 2;
}

message GetOrderResponse {
    int32 code = 1;
    string message = 2;
    Order order = 3;
}

message GetOrdersRequest {
    string user_id = 1;
    string symbol = 2;
    int32 status = 3;
    int32 page = 4;
    int32 page_size = 5;
}

message GetOrdersResponse {
    int32 code = 1;
    string message = 2;
    repeated Order orders = 3;
    int64 total = 4;
}

message GetOrderByClientIDRequest {
    string user_id = 1;
    string client_order_id = 2;
}

message GetOrderByClientIDResponse {
    int32 code = 1;
    string message = 2;
    Order order = 3;
}

message Order {
    string order_id = 1;
    string user_id = 2;
    string symbol = 3;
    int32 side = 4;
    int32 order_type = 5;
    string price = 6;
    int32 quantity = 7;
    int32 filled_quantity = 8;
    string avg_filled_price = 9;
    int32 status = 10;
    string client_order_id = 11;
    string reject_reason = 12;
    string fee = 13;
    int64 created_at = 14;
    int64 updated_at = 15;
}
